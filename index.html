<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>APlane</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f2;
      --text: #111111;
      --panel: #111111;
      --command: #f8f8f2;
      --muted: #5b5f66;
      --border: #d7dacd;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      padding: 32px 16px;
    }

    main {
      width: min(760px, 100%);
      text-align: center;
    }

    img {
      display: block;
      width: min(400px, 82vw);
      height: auto;
      margin: 0 auto 32px;
    }

    p {
      margin: 0 auto;
      padding: 16px;
      text-align: left;
      overflow-wrap: anywhere;
      background: var(--panel);
      color: var(--command);
      border: 1px solid var(--border);
      border-radius: 8px;
      line-height: 1.5;
      font-size: 15px;
    }

    code {
      font: inherit;
    }
  </style>
</head>
<body>
  <main>
    <img src="img/aplane.png" alt="APlane">
    <p><code>curl -fsSL https://raw.githubusercontent.com/aplane-algo/aplane/main/bootstrap-install.sh | bash</code></p>
  </main>
</body>
</html>
