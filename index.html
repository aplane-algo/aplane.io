<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>APlane</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f2;
      --text: #111111;
      --panel: #111111;
      --command: #f8f8f2;
      --muted: #5b5f66;
      --border: #d7dacd;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      justify-items: center;
      align-items: start;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      padding: 12px 16px 32px;
    }

    main {
      width: min(980px, 100%);
      text-align: center;
    }

    img {
      display: block;
      width: min(400px, 82vw);
      height: auto;
      margin: 0 auto 16px;
    }

    .install {
      display: flex;
      align-items: stretch;
      justify-content: center;
      gap: 10px;
      width: fit-content;
      max-width: 100%;
      margin: 0 auto;
    }

    p {
      margin: 0;
      padding: 14px;
      text-align: center;
      overflow-wrap: anywhere;
      background: var(--panel);
      color: var(--command);
      border: 1px solid var(--border);
      border-radius: 8px;
      line-height: 1.5;
      font-size: 15px;
      min-width: 0;
    }

    code {
      font: inherit;
    }

    .copy-btn {
      flex-shrink: 0;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 14px;
      font: inherit;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .copy-btn:hover,
    .copy-btn:focus {
      background: var(--panel);
      color: var(--command);
      outline: none;
    }

    .tagline {
      margin: 0 auto 16px;
      color: var(--text);
      font-size: 15px;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-top: 16px;
    }

    a {
      color: var(--muted);
      text-decoration: none;
      font-size: 15px;
    }

    a:hover,
    a:focus {
      color: var(--text);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <img src="img/aplane.png" alt="APlane">
    <div class="tagline">APlane Signer and Shell for Linux and MacOS</div>
    <div class="install">
      <p><code id="install-cmd">curl -fsSL https://raw.githubusercontent.com/aplane-algo/aplane/main/bootstrap-install.sh | bash</code></p>
      <button type="button" class="copy-btn" id="copy-btn" aria-label="Copy install command">Copy</button>
    </div>
    <script>
      (function () {
        var btn = document.getElementById('copy-btn');
        var cmd = document.getElementById('install-cmd');
        btn.addEventListener('click', function () {
          var text = cmd.textContent;
          var done = function () {
            var original = btn.textContent;
            btn.textContent = 'Copied';
            setTimeout(function () { btn.textContent = original; }, 1500);
          };
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(done, function () {
              fallbackCopy(text); done();
            });
          } else {
            fallbackCopy(text); done();
          }
        });
        function fallbackCopy(text) {
          var ta = document.createElement('textarea');
          ta.value = text;
          ta.setAttribute('readonly', '');
          ta.style.position = 'absolute';
          ta.style.left = '-9999px';
          document.body.appendChild(ta);
          ta.select();
          try { document.execCommand('copy'); } catch (e) {}
          document.body.removeChild(ta);
        }
      })();
    </script>
    <nav aria-label="Project links">
      <a href="https://github.com/aplane-algo/aplane">Github</a>
      <a href="https://github.com/aplane-algo/aplane/blob/main/README.md">README</a>
      <a href="https://github.com/aplane-algo/aplane/blob/main/docs/USER_QUICKSTART.md">QUICKSTART</a>
    </nav>
  </main>
</body>
</html>
